{% extends 'baseapp/index.html' %}

{% load static %}

{% load i18n %}

{% block body %}

<div class="block-header block-header--has-breadcrumb block-header--has-title">
	<div class="container">
		<div class="block-header__body">
			<nav class="breadcrumb block-header__breadcrumb" aria-label="breadcrumb">
				<ol class="breadcrumb__list">
					<li class="breadcrumb__spaceship-safe-area" role="presentation"></li>
					<li class="breadcrumb__item breadcrumb__item--parent breadcrumb__item--first">
						<a href="{% url 'show_index' %}" class="breadcrumb__item-link">Главная</a>
					</li>
					<li class="breadcrumb__item breadcrumb__item--current breadcrumb__item--last" aria-current="page">
						<span class="breadcrumb__item-link">Выйти из аккаунта</span>
					</li>
					<li class="breadcrumb__title-safe-area" role="presentation"></li>
				</ol>
			</nav>
			<h1 class="block-header__title">
				Вы уверены, что хотите выйти из аккаунта?
			</h1>
			<form id="logout" method="post" action="{% url 'account_logout' %}">
				{% csrf_token %}
				{% if redirect_field_value %}
				<input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
				{% endif %}
				<p></p>
				<div class="form-group" align="center">
					<button form="logout" type="submit" class="btn btn-primary btn-lg">Выйти</button>
				</div>
			</form>
		</div>
	</div>
	<div class="block-space block-space--layout--before-footer"></div>
</div>

{% endblock %}
